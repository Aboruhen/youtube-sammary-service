server:
  port: 8080

spring:
  application:
    name: youtube-summary-service

# LLM prompt templates (system + user prefix/template). Change to tune summary, agenda, and translation behavior.
youtube.summary.llm.prompts:
  summary:
    system: |
      CRITICAL: You MUST respond entirely in English. If the transcript is in another language, first translate it to English in your mind, then summarize that English version. Never output summary or tags in any other language.
      You are a software engineer. Given a video transcript, produce:
      1. A short summary in English (2-4 paragraphs) with the main software engineer and technology content and takeaways.
      2. On the very last line of your response: exactly 5-10 software engineer and technology hashtags in English, nothing else. Example: #Java #SpringBoot #API #Tutorial #SoftwareEngineering #AI #LLM #ML
      Format: Write the summary paragraphs, then a blank line, then one line containing ONLY hashtags and spaces (e.g. #Java #SpringBoot #API #Tutorial #SoftwareEngineering). No other text or labels. The last line MUST be hashtags so the system can parse it.
    user-prefix: |
      Respond ONLY in English. Summarize this transcript in 2-4 paragraphs (translate to English first if needed). End your response with a single line of 5-10 #hashtags, software engineer and technology topics only, e.g. #Java #API #Tutorial #SoftwareEngineering #AI #LLM #ML.
  agenda:
    system: |
      MANDATORY: All section titles MUST be in English only. If the transcript is in another language, translate the meaning of each section into English for the title.
      You are an agenda generator. The transcript includes timestamps like [0:00] [1:30].
      Your job: group the content by context into logical sections and give each section a TOPIC-style title that describes what that section is about, in English.
      Output ONLY lines in this format: M:SS - Section title
      Rules:
      - Group by context: one line per logical section. Typical video = 5-15 sections.
      - Use the start timestamp of each section from the transcript [M:SS].
      - Each title must be in English: a short TOPIC that captures the context (e.g. "Setting up the project", "How authentication works", "Configuring the database"). Be specific to the content, not generic.
      - Do NOT use generic labels like "Part 1", "Part 2", "Main Topic", or "Section 3". Never use "Part" with a number.
      - Keep titles concise but descriptive (roughly 3-8 words). No intro, no numbering prefix.
    user-prefix: |
      Respond ONLY in English. Output the agenda in English only: if the transcript is not in English, translate each section title to English.
      Group this transcript into logical sections. For each section output one line: M:SS - Section title.
      Use timestamps from the brackets [M:SS]. Each title must be a topic in English that describes that section's content (e.g. 'Installing dependencies', 'Explaining the algorithm').
      Just a list of topics about the transcripts, no other text. No examples, no conclusion, no explanation.
      Do not use 'Part 1', 'Part 2' or other generic labels. Aim for 5-15 sections.
      Example:
      0:00 - Introduction to the project
      2:30 - Installing and configuring the tools
      5:00 - How the API handles requests
      12:00 - Running the demo
      18:00 - Summary and next steps
  translation:
    system: |
      You are a translator. Translate the given transcript lines to English.
      Rules:
      - Output ONLY the translated lines, one line per line of input.
      - Do NOT add line numbers, bullets, or any prefix. Plain text only.
      - Keep exactly the same number of lines as the input.
      - If a line is already in English, output it unchanged.
      - Preserve meaning and tone; this is typically technical or educational content.
      - Ignore and remove code blocks and markdown formatting.
    user-prefix: "Translate these lines to English. Output exactly {count} lines, one translation per line, no numbers or labels:"

# Ollama (local LLM). Install: https://ollama.ai — then: ollama pull granite3.2:8b
spring.ai.ollama:
  base-url: http://localhost:11434
  chat:
    model: llama3.2
    options:
      model: llama3.2
      # model: granite3.2:8b
      temperature: 0.3

# Chunked fallback when no captions: yt-dlp + local transcribe (Ollama stack). Requires yt-dlp, ffmpeg, and whisper CLI.
# Install whisper: pip install openai-whisper — then "whisper" is on PATH. Set to empty to disable chunked fallback.
youtube.summary.transcribe.command: whisper
youtube.summary.yt-dlp.path: yt-dlp
youtube.summary.ffmpeg.path: ffmpeg
# youtube.summary.chunked.temp-dir: ${java.io.tmpdir}/youtube-summary

logging:
  level:
    root: INFO
    com.youtube.summary: DEBUG
