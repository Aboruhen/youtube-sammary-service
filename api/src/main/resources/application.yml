server:
  port: 8080

spring:
  application:
    name: youtube-summary-service

# Ollama (local LLM). Install: https://ollama.ai — then: ollama pull llama3.2
spring.ai.ollama:
  base-url: http://localhost:11434
  chat:
    options:
      model: llama3.2
      temperature: 0.3

logging:
  level:
    root: INFO
    com.youtube.summary: DEBUG
